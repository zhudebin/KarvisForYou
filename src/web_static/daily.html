<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Karvis · 日记</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
tailwind.config = { theme: { extend: { colors: {
  warm: { 50:'#fdf8f6',100:'#f2e8e5',200:'#eaddd7',300:'#e0cfc7',400:'#d2bab0',500:'#bfa094',600:'#a18072',700:'#977669',800:'#846358',900:'#43302b' }
}}}}
</script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fdf8f6; }
.md-content h1,.md-content h2,.md-content h3 { font-weight: 700; margin: 0.8em 0 0.4em; }
.md-content h1 { font-size: 1.25rem; }
.md-content h2 { font-size: 1.1rem; }
.md-content p { margin: 0.3em 0; }
.md-content ul,.md-content ol { padding-left: 1.2em; margin: 0.3em 0; }
.md-content blockquote { border-left: 3px solid #d2bab0; padding-left: 0.8em; color: #846358; margin: 0.5em 0; }
</style>
</head>
<body class="pb-20" x-data="dailyApp()" x-init="load()">
  <div class="bg-white border-b border-warm-100 px-4 py-3 flex items-center justify-between">
    <h1 class="text-lg font-bold text-warm-900" x-show="!detail">📖 日记</h1>
    <button x-show="detail" @click="detail=null" class="text-warm-600 text-sm flex items-center gap-1">
      ← 返回列表
    </button>
    <div class="flex gap-2 text-xs" x-show="!detail">
      <template x-for="t in tabs" :key="t.key">
        <button @click="tab=t.key" :class="tab===t.key?'bg-warm-700 text-white':'bg-warm-100 text-warm-600'"
          class="px-3 py-1 rounded-full transition" x-text="t.label"></button>
      </template>
    </div>
  </div>

  <!-- 列表视图 -->
  <div class="p-4 space-y-2" x-show="!loading && !detail">
    <template x-for="r in filtered" :key="r.file">
      <div @click="openDetail(r)" class="bg-white rounded-xl p-4 shadow-sm cursor-pointer hover:shadow-md transition">
        <div class="flex items-center justify-between">
          <p class="text-sm font-medium text-warm-800" x-text="r.title"></p>
          <span class="text-xs px-2 py-0.5 rounded-full"
            :class="{'bg-blue-50 text-blue-600':r.type==='daily','bg-purple-50 text-purple-600':r.type==='weekly','bg-green-50 text-green-600':r.type==='monthly','bg-pink-50 text-pink-600':r.type==='mood'}"
            x-text="typeLabel(r.type)"></span>
        </div>
      </div>
    </template>
    <div x-show="!filtered.length" class="text-center py-16">
      <p class="text-4xl mb-3">📖</p>
      <p class="text-warm-600 font-medium">还没有日记</p>
      <p class="text-warm-400 text-sm mt-1">Karvis 会在每晚自动帮你生成日报和情绪日记</p>
      <p class="text-warm-400 text-xs mt-3">💡 多和 Karvis 聊天，日记会更丰富哦~</p>
    </div>
  </div>

  <!-- 详情视图 -->
  <div class="p-4" x-show="detail">
    <div class="bg-white rounded-xl p-5 shadow-sm">
      <h2 class="text-lg font-bold text-warm-900 mb-3" x-text="detail?.title"></h2>
      <div class="md-content text-sm text-warm-800 leading-relaxed" x-html="detailHtml"></div>
    </div>
  </div>

  <div x-show="loading" class="flex items-center justify-center h-64">
    <p class="text-warm-400">加载中...</p>
  </div>

  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-warm-100 flex justify-around py-2 text-xs">
    <a href="/web/dashboard" class="flex flex-col items-center text-warm-400"><span class="text-lg">📊</span>概览</a>
    <a href="/web/notes" class="flex flex-col items-center text-warm-400"><span class="text-lg">📝</span>速记</a>
    <a href="/web/todos" class="flex flex-col items-center text-warm-400"><span class="text-lg">✅</span>待办</a>
    <a href="/web/daily" class="flex flex-col items-center text-warm-700 font-medium"><span class="text-lg">📖</span>日记</a>
    <a href="/web/archive" class="flex flex-col items-center text-warm-400"><span class="text-lg">📁</span>笔记</a>
  </nav>

<script>
const API_HEADERS = () => ({'X-Token': localStorage.getItem('karvis_token')||''});
function checkAuth() { if(!localStorage.getItem('karvis_token')) location.href='/web/login'; }

function dailyApp() {
  return {
    reports: [], loading: true, tab: 'all', detail: null, detailHtml: '',
    tabs: [
      {key:'all',label:'全部'},{key:'daily',label:'日报'},
      {key:'weekly',label:'周报'},{key:'monthly',label:'月报'},{key:'mood',label:'情绪'}
    ],
    get filtered() {
      if (this.tab === 'all') return this.reports;
      return this.reports.filter(r => r.type === this.tab);
    },
    typeLabel(t) { return {daily:'日报',weekly:'周报',monthly:'月报',mood:'情绪'}[t]||t; },
    async load() {
      checkAuth();
      try {
        const r = await fetch('/api/daily', {headers: API_HEADERS()});
        if (r.status === 401) { localStorage.removeItem('karvis_token'); location.href='/web/login'; return; }
        this.reports = (await r.json()).reports || [];
      } catch(e) { console.error(e); }
      this.loading = false;
    },
    async openDetail(report) {
      this.detail = report;
      this.detailHtml = '<p class="text-warm-400 text-center py-8">加载中...</p>';
      try {
        const r = await fetch(`/api/daily/${encodeURIComponent(report.file)}`, {headers: API_HEADERS()});
        const d = await r.json();
        if (d.error) {
          this.detailHtml = `<p class="text-red-400 text-center py-8">${d.error}</p>`;
          return;
        }
        this.detailHtml = marked.parse(d.content || '');
      } catch(e) {
        this.detailHtml = '<p class="text-red-400 text-center py-8">加载失败</p>';
        console.error(e);
      }
    }
  }
}
</script>
</body>
</html>
