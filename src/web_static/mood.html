<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Karvis · 情绪</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
tailwind.config = { theme: { extend: { colors: {
  warm: { 50:'#fdf8f6',100:'#f2e8e5',200:'#eaddd7',300:'#e0cfc7',400:'#d2bab0',500:'#bfa094',600:'#a18072',700:'#977669',800:'#846358',900:'#43302b' }
}}}}
</script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fdf8f6; }
.md-content h1,.md-content h2 { font-weight: 700; margin: 0.8em 0 0.4em; }
.md-content p { margin: 0.3em 0; }
</style>
</head>
<body class="pb-20" x-data="moodApp()" x-init="load()">
  <div class="bg-white border-b border-warm-100 px-4 py-3">
    <button x-show="detail" @click="detail=null" class="text-warm-600 text-sm">← 返回</button>
    <h1 x-show="!detail" class="text-lg font-bold text-warm-900">😊 情绪</h1>
  </div>

  <div class="p-4 space-y-4" x-show="!loading && !detail">
    <!-- 情绪曲线 -->
    <div class="bg-white rounded-xl p-4 shadow-sm" x-show="scores.length">
      <p class="text-sm font-medium text-warm-700 mb-3">近 30 天情绪评分</p>
      <canvas id="moodChart30" height="160"></canvas>
    </div>

    <!-- 统计 -->
    <div class="grid grid-cols-3 gap-3" x-show="scores.length">
      <div class="bg-white rounded-xl p-3 shadow-sm text-center">
        <p class="text-xs text-warm-500">平均</p>
        <p class="text-xl font-bold text-warm-800" x-text="avgScore"></p>
      </div>
      <div class="bg-white rounded-xl p-3 shadow-sm text-center">
        <p class="text-xs text-warm-500">最高</p>
        <p class="text-xl font-bold text-green-600" x-text="maxScore"></p>
      </div>
      <div class="bg-white rounded-xl p-3 shadow-sm text-center">
        <p class="text-xs text-warm-500">最低</p>
        <p class="text-xl font-bold text-red-400" x-text="minScore"></p>
      </div>
    </div>

    <!-- 情绪日记列表 -->
    <div>
      <p class="text-sm font-medium text-warm-700 mb-2">情绪日记</p>
      <template x-for="d in diaries" :key="d.file">
        <div @click="openDiary(d)" class="bg-white rounded-xl p-4 shadow-sm mb-2 cursor-pointer hover:shadow-md transition">
          <p class="text-sm font-medium text-warm-800" x-text="d.title"></p>
          <p class="text-xs text-warm-400" x-text="d.date"></p>
        </div>
      </template>
      <div x-show="!diaries.length && !scores.length" class="text-center py-12">
        <p class="text-4xl mb-3">🌈</p>
        <p class="text-warm-600 font-medium">还没有情绪记录</p>
        <p class="text-warm-400 text-sm mt-1">Karvis 每晚会根据你的聊天自动生成情绪日记</p>
        <p class="text-warm-400 text-xs mt-3">💡 试试说：「今天心情不太好」</p>
      </div>
      <p x-show="!diaries.length && scores.length" class="text-center text-warm-400 py-4">暂无情绪日记</p>
    </div>
  </div>

  <div class="p-4" x-show="detail">
    <div class="bg-white rounded-xl p-5 shadow-sm">
      <h2 class="text-lg font-bold text-warm-900 mb-3" x-text="detail?.title"></h2>
      <div class="md-content text-sm text-warm-800 leading-relaxed" x-html="detailHtml"></div>
    </div>
  </div>

  <div x-show="loading" class="flex items-center justify-center h-64">
    <p class="text-warm-400">加载中...</p>
  </div>

  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-warm-100 flex justify-around py-2 text-xs">
    <a href="/web/dashboard" class="flex flex-col items-center text-warm-400"><span class="text-lg">📊</span>概览</a>
    <a href="/web/notes" class="flex flex-col items-center text-warm-400"><span class="text-lg">📝</span>速记</a>
    <a href="/web/todos" class="flex flex-col items-center text-warm-400"><span class="text-lg">✅</span>待办</a>
    <a href="/web/daily" class="flex flex-col items-center text-warm-400"><span class="text-lg">📖</span>日记</a>
    <a href="/web/archive" class="flex flex-col items-center text-warm-400"><span class="text-lg">📁</span>笔记</a>
  </nav>

<script>
const API_HEADERS = () => ({'X-Token': localStorage.getItem('karvis_token')||''});
function checkAuth() { if(!localStorage.getItem('karvis_token')) location.href='/web/login'; }

function moodApp() {
  return {
    scores: [], diaries: [], loading: true,
    detail: null, detailHtml: '',
    get avgScore() { if(!this.scores.length) return '-'; const s = this.scores.filter(x=>x.score!=null); return s.length ? (s.reduce((a,b)=>a+b.score,0)/s.length).toFixed(1) : '-'; },
    get maxScore() { const s = this.scores.filter(x=>x.score!=null).map(x=>x.score); return s.length ? Math.max(...s) : '-'; },
    get minScore() { const s = this.scores.filter(x=>x.score!=null).map(x=>x.score); return s.length ? Math.min(...s) : '-'; },
    async load() {
      checkAuth();
      try {
        const r = await fetch('/api/mood', {headers: API_HEADERS()});
        if (r.status === 401) { localStorage.removeItem('karvis_token'); location.href='/web/login'; return; }
        const d = await r.json();
        this.scores = d.scores || [];
        this.diaries = d.diaries || [];
        this.$nextTick(() => this.renderChart());
      } catch(e) { console.error(e); }
      this.loading = false;
    },
    renderChart() {
      const el = document.getElementById('moodChart30');
      if (!el || !this.scores.length) return;
      const recent = this.scores.slice(-30);
      new Chart(el, {
        type: 'line',
        data: {
          labels: recent.map(s => s.date ? s.date.slice(5) : ''),
          datasets: [{
            data: recent.map(s => s.score),
            borderColor: '#977669', backgroundColor: 'rgba(151,118,105,0.1)',
            fill: true, tension: 0.4, pointRadius: 3, pointBackgroundColor: '#977669'
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: { y: { min: 1, max: 10, ticks: { stepSize: 1 } } },
          responsive: true, maintainAspectRatio: false
        }
      });
    },
    async openDiary(diary) {
      try {
        const r = await fetch(`/api/archive/${encodeURIComponent(diary.file)}?category=emotion`, {headers: API_HEADERS()});
        const d = await r.json();
        this.detail = diary;
        this.detailHtml = marked.parse(d.content || '');
      } catch(e) { console.error(e); }
    }
  }
}
</script>
</body>
</html>
